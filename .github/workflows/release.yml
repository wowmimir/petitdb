name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.0.1, etc.

permissions:
  contents: write
  packages: write  # Needed if you push to GitHub Container Registry (optional)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      # Cross-compile for all platforms
      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o petitdb-linux-amd64 ./cmd/petitdb
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o petitdb-linux-arm64 ./cmd/petitdb
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o petitdb-darwin-amd64 ./cmd/petitdb
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o petitdb-darwin-arm64 ./cmd/petitdb
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o petitdb-windows-amd64.exe ./cmd/petitdb

      # Create GitHub Release and attach binaries
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            petitdb-linux-*
            petitdb-darwin-*
            petitdb-windows-*
          generate_release_notes: true

  # Optional: Build and push Docker image (separate job)
  docker:
    runs-on: ubuntu-latest
    needs: goreleaser  # Wait for the release to be created
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            wowmimir/petitdb:latest
            wowmimir/petitdb:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}